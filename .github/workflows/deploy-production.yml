name: Deploy to Production

on:
  workflow_run:
    workflows: ["Test and Build Docker"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: ${{ secrets.DO_REGISTRY_NAME }}/be-repo
  REPO_NAME: be-repo

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('dockerfile', 'package*.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Prune old registry tags (keep latest + current sha)
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          KEEP_TAGS="latest $GITHUB_SHA"
          echo "Keeping tags: $KEEP_TAGS"

          TAGS=$(doctl registry repository list-tags "$REPO_NAME" --format Tag --no-header || true)
          if [ -z "$TAGS" ]; then
            echo "No tags found or list failed."
            exit 0
          fi

          for tag in $TAGS; do
            if echo "$KEEP_TAGS" | grep -qw "$tag"; then
              echo "Keeping $tag"
            else
              echo "Deleting $tag"
              doctl registry repository delete-tag "$REPO_NAME" "$tag" --force || true
            fi
          done

          # Trigger garbage collection to reclaim storage
          doctl registry garbage-collection start --force || true

  deploy:
    name: Deploy to DigitalOcean Droplet
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.production.yml to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USERNAME }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: "docker-compose.production.yml"
          target: "/app/be-repo"

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USERNAME }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cd /app/be-repo

            # Log in to DigitalOcean Container Registry
            echo ${{ secrets.DO_ACCESS_TOKEN }} | docker login registry.digitalocean.com -u ${{ secrets.DO_ACCESS_TOKEN }} --password-stdin

            # Pull latest image
            docker compose -f docker-compose.production.yml pull

            # Stop and remove old containers with Doppler
            doppler run --project wdp301_be --config prd -- docker compose -f docker-compose.production.yml down

            # Start new containers with Doppler secrets injection
            doppler run --project wdp301_be --config prd -- docker compose -f docker-compose.production.yml up -d

            # Clean up old images
            docker image prune -af

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_HOST }}
          username: ${{ secrets.DO_DROPLET_USERNAME }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cd /app/be-repo
            docker compose -f docker-compose.production.yml ps
