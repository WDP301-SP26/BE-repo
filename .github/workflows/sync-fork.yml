name: Sync Fork with Upstream

on:
  schedule:
    # Chạy mỗi 30 phút
    - cron: '*/30 * * * *'
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    # Chỉ chạy trên repo fork, không chạy trên repo gốc
    if: github.repository_owner != github.event.organization.login

    permissions:
      contents: write

    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v4
        with:
          # Cần token có quyền push để đẩy code lên fork
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          if [ -z "${{ secrets.UPSTREAM_REPO }}" ]; then
            echo "Error: UPSTREAM_REPO secret is not set."
            exit 1
          fi
          git remote add upstream "https://github.com/${{ secrets.UPSTREAM_REPO }}.git" || true
          git fetch upstream

      - name: Sync main branch
        run: |
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories || { echo "Merge conflict on main"; exit 1; }
          git push origin main

      - name: Sync develop branch (if exists)
        run: |
          if git fetch upstream develop; then
            git checkout develop || git checkout -b develop upstream/develop
            git merge upstream/develop --no-edit --allow-unrelated-histories || { echo "Merge conflict on develop"; exit 0; }
            git push origin develop || true
          else
            echo "Develop branch does not exist on upstream."
          fi
